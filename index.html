    <!-- JSON-LD Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "What formats are the templates in?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "All templates are delivered as high-resolution PNG files optimized for Instagram and LinkedIn. Designed for easy use in Canva, Photoshop, or any design tool."
        }
      }, {
        "@type": "Question",
        "name": "Can I customize the colors and fonts?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Absolutely! Each kit comes with a style guide showing the exact colors and fonts used. You can easily modify them to match your brand using any design software."
        }
      }, {
        "@type": "Question",
        "name": "How does the Pro Plan work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Pro Plan gives you instant access to all current and future kits. You'll receive monthly content drops with fresh templates, and can cancel anytime."
        }
      }, {
        "@type": "Question",
        "name": "Do you offer custom branding integration?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes! We offer professional branding integration services where we customize any kit with your logo, brand colors, and assets. Contact us for pricing."
        }
      }, {
        "@type": "Question",
        "name": "What are the dimensions of the templates?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Instagram posts are 1080×1080px, Instagram stories are 1080×1920px, and LinkedIn banners are 1584×396px. All optimized for the platform."
        }
      }]
    }
    </script>
